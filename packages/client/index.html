<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#06291a" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5fbf6" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#06291a" />
    <title>flashcards</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme")
          var dark =
            stored === "dark" ||
            (!stored && window.matchMedia("(prefers-color-scheme: dark)").matches)
          if (dark) document.documentElement.classList.add("dark")
          document.documentElement.style.backgroundColor = dark ? "#06291a" : "#f5fbf6"
        } catch (e) {}
      })()
    </script>
    <style>
      html {
        background-color: #06291a;
      }
      @media (prefers-color-scheme: light) {
        html {
          background-color: #f5fbf6;
        }
      }
    </style>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-background text-foreground">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
